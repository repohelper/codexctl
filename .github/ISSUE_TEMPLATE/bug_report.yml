name: Bug report
description: Report a reproducible bug
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please provide enough context to reproduce.
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `codexctl --version`
      placeholder: v0.7.0
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS and architecture
      placeholder: Ubuntu 24.04 x86_64
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Exact commands and setup
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs/output
      render: shell
